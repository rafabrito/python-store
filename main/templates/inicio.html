{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} PYTHONSTORE {% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/all.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body>
    
    <div class="conteiner-fluid navegacao">
        <div class="row">
            <div class="col-6 p-3">
                <a href="{% url 'index' %}">
                    <h3>PYTHONSTORE</h3>
                </a>
            </div>
            <div class="col-6 text-end p-3">
                <a href="{% url 'index' %}" class="nav-item">Inicio</a>
                <a href="{% url 'loja' %}" class="nav-item">Loja</a>

                <!-- verifica se existe cliente na sessão-->
                {% if user.is_authenticated %}
                    <a href="" class="nav-item">A minha conta</a>
                    <a href="{% url 'logout_cliente' %}" class="nav-item">Logout</a>
                {% else %}
                    <a href="{% url 'login_cliente' %}" class="nav-item">Login</a>
                    <a href="{% url 'criar_cliente' %}" class="nav-item">Criar Conta</a>
                {% endif %}
                

                <a href="?a=carrinho"><i class="fas fa-shopping-cart"></i></a>
            
                <span class="badge bg-warning"></span>
             </div>
        </div>
    </div>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <div class="conteiner-fluid fixed-bottom rodape">
        <div class="row">
            <div class="col-12 text-center p-3">
                <small>PYTHONSTORE &copy; {% now 'Y' %} </small>
            </div>
        </div>
    </div>

    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    <script src="{% static 'js/app.js' %}"></script>

    
</body>
</html>
